name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Visual-regression baselines are platform-specific (chromium-linux on
# this runner). The first time this workflow runs after committing new
# snapshots from a different platform, it will fail with "snapshot
# doesn't exist". Trigger the `update-snapshots` workflow manually once
# to seed Linux baselines, then this workflow protects against drift.

permissions:
  contents: read

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests (visualLed scope — no auth required)
        # Limit to specs that work without admin credentials / live
        # Supabase. Admin and navigation specs need a logged-in session
        # which is not wired up in this workflow yet; running them here
        # would always fail and mask real regressions.
        run: |
          npx playwright test \
            tests/e2e/smoke.spec.ts \
            tests/e2e/routes.spec.ts \
            tests/e2e/visual-led-workflows.spec.ts \
            tests/e2e/visual-led-responsive.spec.ts \
            tests/e2e/visual-led-ux.spec.ts \
            tests/e2e/visual-led-snapshots.spec.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7

      - name: Upload visual diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs-${{ github.run_id }}
          path: test-results/
          retention-days: 7
