      // Mirrors src/context/I18nContext.tsx: admin paths use admin locale (fallback ru),

        try {
          var path = location.pathname;
          var isAdmin = path.indexOf('/admin') === 0;
          var key = isAdmin ? 'future-screen.locale.admin' : 'future-screen.locale.site';
          var stored = localStorage.getItem(key);
          var fallback = isAdmin ? 'ru' : 'en';
          var lang = stored === 'ru' || stored === 'en' ? stored : fallback;
          document.documentElement.lang = lang;
        } catch (e) {}
      })();
